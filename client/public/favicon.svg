<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#00B37E"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A2020"/>
      <stop offset="70%" stop-color="#050B14"/>
      <stop offset="100%" stop-color="#020608"/>
    </radialGradient>
    <radialGradient id="tealGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGlow)"/>

  <!-- Teal ambient glow inside circle -->
  <circle cx="256" cy="256" r="256" fill="url(#tealGlow)"/>

  <!-- Content clipped to circle -->
  <g clip-path="url(#circle)">

    <!-- Left half of A — teal -->
    <path d="M256 80 L96 432 H176 L256 256 Z" fill="url(#tealGrad)"/>

    <!-- Right half of A — white -->
    <path d="M256 80 L416 432 H336 L256 256 Z" fill="white"/>

    <!-- Logistics swoosh -->
    <path d="M96 432 C96 432 180 330 416 368 V432 Z" fill="#050B14"/>

    <!-- Location pin -->
    <circle cx="390" cy="340" r="14" fill="#00E5A0"/>
    <circle cx="390" cy="340" r="6" fill="#050B14"/>

  </g>

  <!-- Subtle circle border -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#00E5A0" stroke-width="3" stroke-opacity="0.25"/>
</svg>